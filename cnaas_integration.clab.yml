name: cnaas-integration

mgmt:
  network: cnaas_mgmt # management network name
  ipv4-subnet: 10.100.2.0/24 # ipv4 range
  ipv4-gw: 10.100.2.2

topology:
  kinds:
    arista_ceos:
      image-pull-policy: Never
  nodes:
    eosdist1:
      kind: arista_ceos
      image: ceos:4.33.6M
      startup-config: config/eosdist1_startup_config.txt
      mgmt-ipv4: 10.100.2.11
    eosdist2:
      kind: arista_ceos
      image: ceos:4.33.6M
      startup-config: config/eosdist2_startup_config.txt
      mgmt-ipv4: 10.100.2.12
    eosaccess:
      kind:  arista_ceos
      image: ceos:4.33.6M
      startup-config: config/eosaccess_startup_config.txt
      #suppress-startup-config: true  # This node will use ZTP
      # Disable management interface
      network-mode: none
    h1:
      # Autosetup static routes on host
      kind: host
      exec:
        - ip route add 10.0.6.0/24 via 10.100.2.101
        - ip route add 192.168.0.0/24 via 10.100.2.101
        - ip route add 10.100.3.101/32 via 10.100.2.101
        - ip route add 10.100.3.102/32 via 10.100.2.102

  links:
    - endpoints: ["eosdist1:eth3", "eosdist2:eth3"]
    - endpoints: ["eosdist1:eth2", "eosaccess:eth2"]
    - endpoints: ["eosdist2:eth2", "eosaccess:eth3"]
    # Create a dummy interface for eosaccess to act as a client port.
    - type: dummy
      endpoint:
        node: eosaccess
        interface: eth1
    # Management network
    - endpoints: ["eosdist1:eth1", "mgmt-net:eosdist1-eth1"]
    - endpoints: ["eosdist2:eth1", "mgmt-net:eosdist2-eth1"]
